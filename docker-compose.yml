services:
  # ── Backend Django + DRF ──────────────────────────────────────────────────
  siia-backend:
    build:
      context: ./siia-backend
      dockerfile: Dockerfile
    container_name: siia-backend
    restart: unless-stopped
    environment:
      # Django
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      SIIA_ENV: ${SIIA_ENV:-prod}
      
      # PostgreSQL
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_SEARCH_PATH: ${POSTGRES_SEARCH_PATH:-reabilita,siagg,public}
      
      # LDAP (opcional)
      USE_LDAP_AUTH: ${USE_LDAP_AUTH:-false}
      
      # CMS: whitelist de hosts permitidos
      CMS_ALLOWED_NEXTCLOUD_HOSTS: ${CMS_ALLOWED_NEXTCLOUD_HOSTS:-}
      CMS_ALLOWED_LEGACY_HOSTS: ${CMS_ALLOWED_LEGACY_HOSTS:-}
      CMS_ALLOWED_EXTERNAL_HOSTS: ${CMS_ALLOWED_EXTERNAL_HOSTS:-}
    
    volumes:
      - siia_media:/app/media
      - siia_static:/app/staticfiles
    
    networks:
      - siia_net
    
    # Health check: verifica se Django está respondendo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Frontend React + Vite ─────────────────────────────────────────────────
  siia-frontend:
    build:
      context: ./siia-frontend
      dockerfile: Dockerfile
    container_name: siia-frontend
    restart: unless-stopped
    depends_on:
      siia-backend:
        condition: service_healthy
    networks:
      - siia_net
    
    # Health check: verifica se frontend está respondendo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  # Media: upload de arquivos (persistente)
  siia_media:
    driver: local
  
  # Static: arquivos estáticos do Django (persistente)
  siia_static:
    driver: local

networks:
  # Rede bridge para comunicação intra-container
  siia_net:
    driver: bridge
    name: siia_net
